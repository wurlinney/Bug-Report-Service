services:
  postgres:
    image: postgres:16-alpine
    env_file:
      - ../.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bug}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bug}
      POSTGRES_DB: ${POSTGRES_DB:-bugdb}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bug} -d ${POSTGRES_DB:-bugdb}" ]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - pg_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    command: server /data --console-address ":9001"
    env_file:
      - ../.env
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - minio_data:/data

  minio-init:
    image: quay.io/minio/mc:latest
    env_file:
      - ../.env
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >
        mc alias set local http://minio:9000 ${S3_ACCESS_KEY:-minioadmin} ${S3_SECRET_KEY:-minioadmin} &&
        mc mb -p local/${S3_BUCKET:-bug-attachments} || true &&
        mc anonymous set none local/${S3_BUCKET:-bug-attachments} || true

  migrate:
    image: migrate/migrate
    command: [
      "-path", "/migrations",
      "-database", "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable",
      "up"
    ]
    volumes:
      - ../migrations:/migrations
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: ../
      dockerfile: deployments/Dockerfile
    env_file:
      - ../.env
    ports:
      - "${HTTP_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      migrate:
        condition: service_started

  swagger-ui:
    image: swaggerapi/swagger-ui:latest
    environment:
      SWAGGER_JSON: /spec/openapi.yaml
    volumes:
      - ../docs/openapi.yaml:/spec/openapi.yaml:ro
    ports:
      - "${SWAGGER_PORT:-8081}:8080"

volumes:
  pg_data:
  minio_data:

